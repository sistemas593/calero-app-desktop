spring.jpa.hibernate.ddl-auto=none

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true

spring.main.web-application-type=none

# Inicializacion perezosa: los beans se crean solo cuando se usan por primera vez.
# Esto reduce el tiempo de app.run() de ~50s a ~15-20s (no instancia JPA/Hibernate al arrancar).
spring.main.lazy-initialization=true

# Deshabilitar JMX — no tiene utilidad en una app de escritorio y añade overhead al inicio.
spring.jmx.enabled=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
